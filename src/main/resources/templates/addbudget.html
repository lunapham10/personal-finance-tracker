<!DOCTYPE HTML>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <title>Add budget</title>
    <meta http-equiv="Content-Type" content="text/html; charset=UTF-8" />
    <link type="text/css" rel="stylesheet" th:href="@{/css/bootstrap.min.css}" />
</head>

<body>
    <h1>Add month budget</h1>
    <div>
        <div class="col-md-4">

            <!-- form -->
            <form th:object="${budget}" th:action="@{/savebudget}" action="#" method="post">
                <input type="hidden" th:field="*{budgetid}" />
                <div style="clear: both; display: block; height: 10px;"></div>
                <label for="category">Category</label>
                <select th:field="*{category}" class="form-control" id="categorySelect">
                    <option th:each="cat : ${categories}" th:value="${cat.categoryid}" th:text="${cat.name}"
                        th:data-type="${cat.type}"></option>
                </select>

                <div style="clear: both; display: block; height: 10px;"></div>

                <label for="budgetDate">Target Month</label>
                <input type="month" th:field="*{budgetDate}" class="form-control" />

                <div style="clear: both; display: block; height: 10px;"></div>
                <label for="amount">Budget Limit</label>
                <input type="text" id="amount" th:field="*{amount}" class="form-control" />


                <div style="clear: both; display: block; height: 10px;"></div>
                <input type="submit" value="Save Budget"></input>
                <a href="/details" class="btn btn-secondary">Cancel</a>
            </form>
        </div>
    </div>

    <table class="table table-striped">
        <tr>
            <th>Category</th>
            <th>Target Month</th>
            <th>Budget Limit</th>
            <th>Action</th>
        </tr>
        <tr th:each="budget : ${budgets}">
            <td th:text="${budget.category.name}"></td>
            <td th:text="${budget.budgetDate}"></td>
            <td th:text="${budget.amount}"></td>
            <td><a th:href="@{/editbudget/{id}(id=${budget.budgetid})}" class="btn btn-danger btn-sm">Edit</a></td>
            <td sec:authorize="hasAuthority('ADMIN')"><a th:href="@{/deletebudget/{id}(id=${budget.budgetid})}"
                    class="btn btn-danger btn-sm">Delete</a></td>
        </tr>
    </table>
</body>

</html>
