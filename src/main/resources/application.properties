spring.application.name=personal-finance-tracker

#Port
server.port=7012

#REST API
spring.data.rest.base-path=/api

# --- DATABASE MARIADB ---
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.database-platform=org.hibernate.dialect.MariaDBDialect
spring.datasource.driver-class-name=org.mariadb.jdbc.Driver
spring.datasource.url=jdbc:mariadb://localhost:3306/oanhp?useUnicode=true&useJDBCCompliantTimezoneShift=true&useLegacyDatetimeCode=false&serverTimezone=UTC
spring.datasource.username=oanhp
spring.datasource.password=password
spring.jpa.hibernate.ddl-auto=create

# --- HTTPS CONFIGURATION ---
server.ssl.enabled=true
server.ssl.key-store-type=PKCS12
server.ssl.key-alias=tomcat
server.ssl.key-store=/etc/ssl/private/springboot-example.p12
server.ssl.key-store-password=changeit

# --- EMAIL CONFIGURATION ---
spring.mail.host=smtp.gmail.com
spring.mail.username=kieuoanh23111993@gmail.com
spring.mail.password=${MAIL_PASSWORD}
spring.mail.port=587
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

